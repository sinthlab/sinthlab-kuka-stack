/**:
  ros__parameters:
    # Perturb drives a joint position controller (LBRJointPositionCommandController); the cabinet
    # (LbrImpedanceControlServer) provides the compliance.
    command_mode: joint
    apple_pluck_impedance_control_displacement:
      update_rate: 200
      base_frame: lbr_link_0
      ee_frame: lbr_link_ee
      cartesian_axis: z
      cartesian_displacement_threshold_m: 0.2
      force_release_shutdown_delay_sec: 0.8
      debug_log_enabled: false
      debug_log_rate_hz: 2.0
    move_to_start:
      update_rate: 200
      target_joint_position:
      - 0.0
      - 10.0
      - 0.0
      - -80.0
      - 0.0
      - 90.0
      - 0.0
      joint_move_tolerance: 0.01
      move_to_pos_v_max:  # peak joint speed [deg/s] (converted to rad/s in code)
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      move_to_pos_a_max: 2.0  # joint acceleration limit [rad/s^2]
      move_to_pos_j_max: 5.0  # joint jerk limit [rad/s^3]
      debug_log_enabled: false
      debug_log_rate_hz: 2.0
    perturb_start:
      update_rate: 200
      # Perturbation target posture. The delta vs. move_to_start is the perturbation
      # (currently +15 deg on A1 -> lateral base sweep).
      target_joint_position:
      - 15.0
      - 10.0
      - 0.0
      - -80.0
      - 0.0
      - 90.0
      - 0.0
      joint_move_tolerance: 0.01
      move_to_pos_v_max:  # peak joint speed [deg/s]; raise a/j_max below for a snappier perturbation
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      move_to_pos_a_max: 2.0  # joint acceleration limit [rad/s^2]
      move_to_pos_j_max: 5.0  # joint jerk limit [rad/s^3]
      start_delay_sec: 1.5  # delay after the audio cue before the perturbation move begins [s]
      debug_log_enabled: false
      debug_log_rate_hz: 2.0
    move_to_start_recover:
      update_rate: 200
      target_joint_position:
      - 0.0
      - 10.0
      - 0.0
      - -80.0
      - 0.0
      - 90.0
      - 0.0
      joint_move_tolerance: 0.15
      move_to_pos_v_max:  # peak joint speed [deg/s]
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      - 40.0
      move_to_pos_a_max: 2.0  # joint acceleration limit [rad/s^2]
      move_to_pos_j_max: 5.0  # joint jerk limit [rad/s^3]
      wait_for_physical_arrival: true
      debug_log_enabled: false
      debug_log_rate_hz: 2.0
    audio_cue_play:
      frequency_hz: 1500
      duration_ms: 1500
    audio_cue_snap:
      frequency_hz: 2000
      duration_ms: 500
