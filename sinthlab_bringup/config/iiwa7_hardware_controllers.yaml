# Use of /** so that the configurations hold for controller
# managers regardless of their namespace.
/**/controller_manager:
  ros__parameters:
    update_rate: 100
    enforce_command_limits: true # can be removed from Kilted onward

    # ROS 2 control broadcasters
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    force_torque_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    # LBR ROS 2 control broadcasters
    estimated_wrench_interface:
      type: lbr_ros2_control/EstimatedWrenchInterface

    lbr_state_broadcaster:
      type: lbr_ros2_control/LBRStateBroadcaster

    # ROS 2 control controllers
    # kuka_clik_controller -> restricted-plane scenario (cartesian target -> CLIK IK -> joints)
    kuka_clik_controller:
      type: kuka_clik_controller/KukaClikController

    # LBR ROS 2 control controllers
    # lbr_joint_position_command_controller -> apple-pluck / perturb (joint positions -> FRI)
    lbr_joint_position_command_controller:
      type: lbr_ros2_control/LBRJointPositionCommandController

# ROS 2 control broadcasters
/**/force_torque_broadcaster:
  ros__parameters:
    frame_id: lbr_link_ee # note: frame_id must equal estimated_wrench_interface.wrench_estimator.chain_tip; namespace: https://github.com/ros2/rviz/issues/1103
    sensor_name: estimated_wrench_interface # note: name must equal estimated_wrench_interface node name (chained)

# LBR ROS 2 control broadcasters
/**/estimated_wrench_interface:
  ros__parameters:
    robot_name: lbr
    wrench_estimator:
      chain_root: lbr_link_0
      chain_tip: lbr_link_ee
      damping: 0.2
      force_x_th: 2.0
      force_y_th: 2.0
      force_z_th: 2.0
      torque_x_th: 0.5
      torque_y_th: 0.5
      torque_z_th: 0.5

/**/lbr_state_broadcaster:
  ros__parameters:
    robot_name: lbr

# LBR ROS 2 control controllers
/**/lbr_joint_position_command_controller:
  ros__parameters:
    robot_name: lbr

/**/kuka_clik_controller:
  ros__parameters:
    update_rate: 1000
    robot_base_link: "lbr_link_0"
    end_effector_link: "lbr_link_ee"
    compliance_ref_link: "lbr_link_ee"
    joints:
      - lbr_A1
      - lbr_A2
      - lbr_A3
      - lbr_A4
      - lbr_A5
      - lbr_A6
      - lbr_A7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    max_linear_velocity: 0.2
    max_angular_velocity: 0.2
    clik_dt: 0.001
    clik_it_max: 100
    clik_eps: 1e-4
    clik_filter_alpha: 0.99
    # Redundancy posture the CLIK biases toward, in DEGREES (controller_base converts to rad).
    # >>> MUST equal the restricted-plane move_to_start.target_joint_position
    #     (sinthlab_bringup/config/virtual_fixtures_params.yaml). If you change that start pose,
    #     change this too — otherwise the CLIK reaches the right tool pose in a weird arm posture.
    nullspace_desired_configuration: [0.0, 10.0, 0.0, -80.0, 0.0, 90.0, 0.0]
