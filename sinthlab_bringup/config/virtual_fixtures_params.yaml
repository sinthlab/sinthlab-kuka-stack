/**:
  ros__parameters:
    # Restricted-plane uses kuka_clik_controller (cartesian) — move_to_start/recover default to
    # cartesian command_mode (no command_mode key here), and MoveRestrictedOnAPlaneAction streams
    # the fixture-constrained equilibrium pose. The cabinet (LbrImpedanceControlServer) provides
    # the compliance.
    state_topic: "lbr_state"
    base_link: "lbr_link_0"
    end_effector_link: "lbr_link_ee"

    move_to_start:
      update_rate: 200
      target_joint_position: [0.0, 30.0, 0.0, -45.0, 0.0, 90.0, 0.0]
      joint_move_tolerance: 0.01
      move_to_pos_v_max: [40.0, 40.0, 40.0, 40.0, 40.0, 40.0, 40.0]  # peak joint speed [deg/s]
      move_to_pos_a_max: 2.0  # joint acceleration limit [rad/s^2]
      move_to_pos_j_max: 5.0  # joint jerk limit [rad/s^3]
      debug_log_enabled: false
      debug_log_rate_hz: 2.0

    audio_cue_play:
      frequency_hz: 1500
      duration_ms: 1500
    apple_pluck_impedance_control_displacement:
      update_rate: 200
      base_frame: lbr_link_0
      ee_frame: lbr_link_ee
      cartesian_axis: z
      cartesian_displacement_threshold_m: 0.5
      force_release_shutdown_delay_sec: 0.8
      debug_log_enabled: false
      debug_log_rate_hz: 2.0
    move_to_start_recover:
      update_rate: 200
      target_joint_position: [0.0, 30.0, 0.0, -45.0, 0.0, 90.0, 0.0]
      joint_move_tolerance: 0.15
      move_to_pos_v_max: [40.0, 40.0, 40.0, 40.0, 40.0, 40.0, 40.0]  # peak joint speed [deg/s]
      move_to_pos_a_max: 2.0  # joint acceleration limit [rad/s^2]
      move_to_pos_j_max: 5.0  # joint jerk limit [rad/s^3]
      wait_for_physical_arrival: true
      debug_log_enabled: false
      debug_log_rate_hz: 2.0
    audio_cue_snap:
      frequency_hz: 2000
      duration_ms: 500

    # Selects which fixture geometry below is active; switch this to change the constraint.
    virtual_fixture_profile: "sine_wave"
    virtual_fixtures:
      # The KUKA cabinet runs Cartesian impedance (run LbrImpedanceControlServer on the SmartPad);
      # this node streams the fixture-constrained equilibrium pose.
      max_target_step_m: 0.01   # cap on commanded-equilibrium move per tick [m] (jerk guard)
      simple_plane:
        type: "plane"
        restricted_axis: "y" # "x", "y", or "z"
      bounding_box:
        type: "cartesian_box"
        z_min: 0.3
        x_min: 0.2
        x_max: 0.5
      flat_table:
        type: "cartesian_box"
        z_min: 0.3
      cylinder_tube:
        type: "cylinder"
        radius: 0.4
        center_x: 0.0
        center_y: 0.0
      sine_wave:
        type: "sinusoid"
        amplitude: 0.1
        spatial_freq: 20.0
        pull_axis: "z"
        osc_axis: "y"
